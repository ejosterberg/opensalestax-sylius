name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} — lint + stan + psalm + phpunit + audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist --no-interaction

      - name: Lint (php-cs-fixer)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1

      - name: Static analysis (phpstan)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Static analysis (psalm)
        run: vendor/bin/psalm --no-progress --show-info=false

      - name: Unit tests
        run: vendor/bin/phpunit

      - name: Composer audit
        run: composer audit --no-dev --abandoned=ignore

  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify DCO sign-off on every commit
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            if ! git log -1 --format="%B" "$sha" | grep -qE "^Signed-off-by: "; then
              echo "Missing Signed-off-by on $sha"
              git log -1 --format="  %h %s" "$sha"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "::error::One or more commits are missing DCO sign-off."
            echo "Amend with: git commit --amend -s    (or rebase + sign each commit)"
            exit 1
          fi
